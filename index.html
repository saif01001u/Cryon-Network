<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryon Network | Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0a0a0a] text-cyan-400 flex items-center justify-center h-screen overflow-hidden">
    <div class="text-center p-8 border border-cyan-900 rounded-3xl bg-black/50 backdrop-blur-lg">
        <h1 class="text-6xl font-black tracking-tighter mb-2 animate-pulse">CRYON</h1>
        <p class="text-sm tracking-[0.3em] uppercase opacity-70 mb-8">Sovereign Identity Protocol</p>
        
        <div class="space-y-4">
            <div class="text-2xl font-bold border-t border-b border-cyan-500/30 py-4">
                YOUR IDENTITY. YOUR OWNERSHIP.
            </div>
            <p class="text-gray-400 max-w-xs mx-auto">The premier sovereign identity protocol on Solana. Register your immutable presence.</p>
        </div>

        <div class="mt-10 flex flex-col items-center gap-2">
            <span class="flex h-3 w-3 relative">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-3 w-3 bg-cyan-500"></span>
            </span>
            <span class="text-xs font-mono uppercase tracking-widest text-cyan-500">System Live on Mainnet</span>
        </div>
    </div>

</html>
